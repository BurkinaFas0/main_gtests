name: CI/CD

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential
    
    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON
    
    - name: Build
      run: cmake --build build -j $(nproc)
    
    - name: Run tests
      working-directory: build
      run: ctest --output-on-failure

  create-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:                          # <-- ДОБАВЛЕНО
      contents: write                     # <-- ДОБАВЛЕНО
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential
    
    - name: Configure CMake (Release)
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF
    
    - name: Build Release
      run: cmake --build build -j $(nproc)
    
    - name: Create artifact
      run: |
        mkdir -p calculator-release
        cp build/src/calculator calculator-release/
        cd calculator-release
        tar -czf ../calculator-${{ github.ref_name }}-linux.tar.gz .
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: calculator-${{ github.ref_name }}-linux.tar.gz
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false